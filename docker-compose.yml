services:
  gpt_chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpt_chat
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      HOME: /var/lib/copilot
      XDG_RUNTIME_DIR: /var/lib/copilot/.runtime
      DBUS_SESSION_BUS_ADDRESS: unix:path=/var/lib/copilot/.runtime/bus
      COPILOT_CLI_PATH: /usr/local/bin/copilot
    volumes:
      - ./.data:/app/.data
      - copilot_cli_home:/var/lib/copilot
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: gpt_chat_nginx
    depends_on:
      - gpt_chat
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_CERTS_DIR:-./.data/nginx/certs}:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  copilot_cli_home:
